<script>
(async function(){
  const DATA=window.WEB3_JOBS_DATA;
  if(!DATA){document.getElementById("load-error").style.display="block";return;}
  if(!Array.isArray(DATA.jobs) && Array.isArray(DATA.chunks)){
    try{ const arrs=await Promise.all(DATA.chunks.map(c=>fetch(c).then(r=>r.ok?r.json():[]))); DATA.jobs=arrs.flat(); }catch(e){}
  }
  if(!Array.isArray(DATA.jobs) || !DATA.jobs.length){document.getElementById("load-error").style.display="block";return;}
  const data=DATA.jobs, lastUpdated=DATA.lastUpdated||"", lastUpdatedAt=DATA.lastUpdatedAt||"";
  const isNew=d=>d.firstSeen&&d.firstSeen===lastUpdated;
  const STALE_DAYS=30;
  const isStale=d=>{if(!d.lastSeen)return false;const t=Date.parse(d.lastSeen+"T00:00:00Z");return isFinite(t)&&(Date.now()-t)/86400000>STALE_DAYS;};
  const pad2=n=>String(n).padStart(2,"0");
  const fmtDT=iso=>{const d=new Date(iso);if(isNaN(d.getTime()))return iso||lastUpdated;return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;};
  const updDisplay=lastUpdatedAt?fmtDT(lastUpdatedAt):lastUpdated;
  const updFresh=lastUpdatedAt?((Date.now()-new Date(lastUpdatedAt).getTime())/36e5<=6):false;

  let funcLabels, catLabels, lvlLabels;
  function buildLabels(){ funcLabels=I18N.map("func"); catLabels=I18N.map("cat"); lvlLabels=I18N.map("lvl"); }
  buildLabels();
  const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const palette=['#6d5efc','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#3b82f6'];
  const acolor=n=>{let h=0;for(const c of (n||""))h=(h*31+c.charCodeAt(0))>>>0;return palette[h%palette.length];};
  const initial=n=>((n||"?").trim()[0]||"?").toUpperCase();
  const isEmail=s=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s||"");

  const SRC={'jobs.lever.co':'Lever','jobs.ashbyhq.com':'Ashby','job-boards.greenhouse.io':'Greenhouse','boards.greenhouse.io':'Greenhouse',
    'web3.career':'Web3.career','cryptojobslist.com':'CryptoJobsList','cryptocurrencyjobs.co':'CryptocurrencyJobs','v2ex.com':'V2EX',
    'learnblockchain.cn':'登链社区','crypto-careers.com':'Crypto-Careers','nodeflair.com':'NodeFlair','simplify.jobs':'Simplify',
    'weworkremotely.com':'WeWorkRemotely','beincrypto.com':'BeInCrypto'};
  const srcOf=link=>{try{const h=new URL(link).hostname.replace(/^www\./,'');return SRC[h]||(h.includes('.')?h:'—');}catch(e){return '—';}};
  const logoUrl=j=>{const D=window.CNH_DOMAINS||{};let h=D[j.company]||"";if(!h){try{const host=new URL(j.link).hostname.replace(/^www\./,'');if(SRC[host]||Object.keys(SRC).some(a=>host.endsWith('.'+a)))h="";else{const p=host.split('.'),label=(p.length>=2?p[p.length-2]:p[0]),cn=(j.company||"").toLowerCase().replace(/[^a-z0-9]/g,"");h=(cn.length>=3&&label.length>=3&&(cn===label||label.includes(cn)))?host:"";}}catch(e){h="";}}return h?'https://www.google.com/s2/favicons?sz=64&domain='+encodeURIComponent(h):'';};
  const avatarHtml=j=>`<div class="avatar" style="background:${acolor(j.company)}"><span class="ltr">${esc(initial(j.company))}</span>${logoUrl(j)?`<img class="logo-img" src="${logoUrl(j)}" loading="lazy" alt="" onerror="this.remove()">`:""}</div>`;

  const state={search:"",contactOnly:false,sort:"latest"};
  document.getElementById("search").addEventListener("input",e=>{state.search=e.target.value.trim().toLowerCase();render();});
  const tc=document.getElementById("t-contact");
  tc.onclick=()=>{state.contactOnly=!state.contactOnly;tc.classList.toggle("on");render();};
  document.getElementById("sort").onchange=e=>{state.sort=e.target.value;render();};

  // 联系方式覆盖率（卖点展示）
  function paintCov(){
    const total=data.length, wc=data.filter(j=>j.contact||j.contactInfo).length, pct=total?Math.round(wc/total*100):0;
    const el=document.getElementById("cov");
    el.innerHTML=I18N.t("hh.coverage")+' <b>'+pct+'%</b>'; el.title=wc+" / "+total;
  }
  // 导出 CSV（软引导：导出后温和邀请赞赏；永不拦截下载、不收费、不解锁）
  const csvCell=v=>{v=String(v==null?"":v);return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  function exportCSV(){
    const r=rows(), zh=I18N.lang==="zh";
    const headers=zh
      ?["招聘公司","公司类型","岗位","职能","级别","地点","薪资","技能关键词","职责关键词","来源渠道","联系人","联系方式","投递链接","最新发布","状态"]
      :["Company","Type","Role","Function","Level","Location","Salary","Skills","Duties","Source","Contact","Contact info","Apply link","Posted","Status"];
    const lines=[headers.map(csvCell).join(",")];
    for(const j of r){
      const status=j.linkDead?(zh?"原页面已下线":"Link offline"):(isStale(j)?(zh?"可能已截止":"May be closed"):"");
      lines.push([j.company,catLabels[j.category]||j.category,j.position,funcLabels[j.func]||j.func,lvlLabels[j.level]||j.level,j.location,j.salary||(zh?"面议":"Negotiable"),(j.keywords||[]).join(" / "),(j.duties||[]).join(" / "),srcOf(j.link),j.contact||"",j.contactInfo||"",j.link||"",j.firstSeen||"",status].map(csvCell).join(","));
    }
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=url; a.download="chainhire-leads-"+(new Date().toISOString().slice(0,10))+".csv";
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),2000);
    nudge(r.length);
  }
  function nudge(n){
    let t=document.getElementById("hh-toast");
    if(!t){ t=document.createElement("div"); t.id="hh-toast"; t.className="hh-toast"; document.body.appendChild(t); }
    t.innerHTML=I18N.t("hh.exported").replace("{n}",n)+' · <a id="hh-tip">'+I18N.t("hh.tipnudge")+'</a>';
    t.classList.add("on");
    const tip=document.getElementById("hh-tip");
    if(tip) tip.onclick=()=>{ const f=document.getElementById("cnh-fab2"); if(f) f.click(); t.classList.remove("on"); };
    clearTimeout(nudge._t); nudge._t=setTimeout(()=>t.classList.remove("on"),6500);
  }
  document.getElementById("export").onclick=exportCSV;

  function rows(){
    let r=data.filter(j=>{
      if(state.contactOnly && !(j.contact||j.contactInfo)) return false;
      if(state.search){const b=(j.company+" "+j.position+" "+srcOf(j.link)+" "+(j.contact||"")+" "+(j.contactInfo||"")+" "+j.location+" "+(j.keywords||[]).join(" ")+" "+(j.duties||[]).join(" ")).toLowerCase();if(!b.includes(state.search))return false;}
      return true;
    });
    const s=state.sort;
    if(s==="company") r.sort((a,b)=>a.company.localeCompare(b.company,"en"));
    else if(s==="salary") r.sort((a,b)=>(b.salaryNum||0)-(a.salaryNum||0));
    else r.sort((a,b)=>(b.firstSeen||"").localeCompare(a.firstSeen||"") || (isNew(b)?1:0)-(isNew(a)?1:0)); // latest
    return r;
  }

  function render(){
    const r=rows();
    document.getElementById("cnt-w").innerHTML=I18N.t("hh.count.tpl").replace("{n}",'<b>'+r.length+'</b>');
    document.getElementById("empty").style.display=r.length?"none":"block";
    document.getElementById("tbody").innerHTML=r.map(j=>{
      const neg=!j.salary||/面议/.test(j.salary);
      const src=srcOf(j.link);
      const stale=isStale(j), dead=!!j.linkDead;
      const contactCell=j.contact?`<span class="contact">${esc(j.contact)}</span>`:`<span class="contact none">—</span>`;
      let cinfo;
      if(dead){ cinfo=(j.contactInfo?((isEmail(j.contactInfo)?`<a href="mailto:${esc(j.contactInfo)}">${esc(j.contactInfo)}</a>`:`<span>${esc(j.contactInfo)}</span>`)+' · '):'')+`<span class="hh-dead">${I18N.t('badge.dead')}</span>`; }
      else if(j.contactInfo){ cinfo=isEmail(j.contactInfo)?`<a href="mailto:${esc(j.contactInfo)}">${esc(j.contactInfo)}</a>`:`<span>${esc(j.contactInfo)}</span>`; cinfo+=` · <a class="apply" href="${j.link}" target="_blank" rel="noopener">${I18N.t('hh.origin')}</a>`; }
      else { cinfo=`<a class="apply" href="${j.link}" target="_blank" rel="noopener">${I18N.t('hh.apply')}</a>`; }
      const fg=(window.CNH_FLAGS&&window.CNH_FLAGS[j.company])||null;
      const badges=(isNew(j)?'<span class="new">NEW</span>':'')+(stale?`<span class="hh-stale">${I18N.t('badge.stale')}</span>`:'')+(dead?`<span class="hh-dead">${I18N.t('badge.dead')}</span>`:'')+(fg?`<span class="hh-flag" title="${esc(I18N.lang==="zh"?fg.zh:fg.en)}">⚠️ ${I18N.t('flag.note')}</span>`:'');
      return `<tr class="${isNew(j)?'is-new':''}"${dead?' style="opacity:.66"':''}>
        <td><div class="co">${avatarHtml(j)}
          <div><div class="co-name">${esc(j.company)}</div><div class="co-cat">${catLabels[j.category]||j.category}</div></div></div></td>
        <td><div class="pos">${esc(j.position)}${badges}</div>
          <div class="ptags"><span class="tag f-${j.func||'ga'}">${funcLabels[j.func]||'其他'}</span><span class="tag">${lvlLabels[j.level]||j.level}</span><span class="tag">📍 ${esc(j.location)}</span></div></td>
        <td class="kwcell">
          ${(j.keywords&&j.keywords.length)?`<div class="ptags">${j.keywords.slice(0,6).map(k=>`<span class="kw">${esc(I18N.kw(k))}</span>`).join("")}</div>`:""}
          ${(j.duties&&j.duties.length)?`<div class="ptags" style="margin-top:5px"><span class="dlabel">${I18N.t("hh.duty")}</span>${j.duties.slice(0,6).map(k=>`<span class="duty">${esc(I18N.duty(k))}</span>`).join("")}</div>`:""}
          ${(!(j.keywords&&j.keywords.length)&&!(j.duties&&j.duties.length))?'<span class="kwnone">—</span>':""}</td>
        <td><span class="salary ${neg?'neg':''}">${esc(j.salary?I18N.salary(j.salary):I18N.t('salary.negotiable'))}</span></td>
        <td><span class="srctag">${esc(src)}</span></td>
        <td>${contactCell}</td>
        <td class="cinfo">${cinfo}</td>
        <td><span class="posted">${j.firstSeen||'—'}</span></td>
      </tr>`;
    }).join("");
  }

  // header pill
  const pill=document.getElementById("upd"),t=document.getElementById("upd-t");
  pill.className="upd"+(updFresh?"":" stale");
  const withContact=data.filter(j=>j.contact||j.contactInfo).length;
  function head(){
    t.textContent=I18N.t("upd.prefix")+" "+updDisplay;
    const fn=I18N.lang==="zh"
      ? `来源渠道由职位链接自动识别；联系人 / 联系方式仅展示来源公开招聘信息中明确披露的内容（当前 ${withContact} 条含直接联系方式，其余以来源渠道投递），不含任何非公开数据 · 最近更新 ${updDisplay}`
      : `Source auto-detected from the job link; contacts shown only when publicly disclosed by the source (${withContact} with direct contact, the rest apply via source); no non-public data · updated ${updDisplay}`;
    document.getElementById("note").innerHTML=`${fn} · <a href="index.html" style="color:var(--accent)">${I18N.lang==="zh"?"← 返回职位列表":"← Back to jobs"}</a>`;
    paintCov();
  }

  head(); render();
  window.addEventListener("langchange",()=>{ buildLabels(); head(); render(); });
})();
</script>
</body>
</html>
