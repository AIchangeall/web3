<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>猎头端 · 链聘 ChainHire</title>
<style>
  :root{
    color-scheme:light;
    --accent:#6d5efc;--bg:#f4f5f9;--card:#fff;--ink:#0f1729;--muted:#6b7280;--line:#e8eaf0;
    --grad:linear-gradient(135deg,#6d5efc 0%,#a855f7 100%);
    --shadow:0 1px 2px rgba(15,23,41,.04),0 1px 3px rgba(15,23,41,.06);
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",Inter,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}

  .nav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:saturate(150%) blur(10px);border-bottom:1px solid var(--line)}
  .nav-in{max-width:1280px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:24px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:var(--grad);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
  .brand small{display:block;font-weight:500;font-size:11px;color:var(--muted);margin-top:1px}
  .nav-links{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}
  .nav-links a{padding:7px 14px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--muted)}
  .nav-links a:hover{background:#f0f1f6;color:var(--ink)}
  .nav-links a.active{background:#efeaff;color:var(--accent)}
  .nav-right{margin-left:auto}
  .upd{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#059669;background:#e6f6ef;border:1px solid #c8ebd9;padding:4px 10px;border-radius:999px}
  .upd .dot{width:7px;height:7px;border-radius:50%;background:#10b981}
  .upd.stale{color:#b45309;background:#fdf2e0;border-color:#f6e0bd}.upd.stale .dot{background:#f59e0b}

  .head{max-width:1280px;margin:0 auto;padding:30px 24px 6px}
  .head h1{font-size:26px;margin:0 0 6px;letter-spacing:-.02em;font-weight:800}
  .head p{margin:0;color:var(--muted);font-size:14px}

  .wrap{max-width:1280px;margin:18px auto 50px;padding:0 24px}
  .bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .bar .cnt{font-size:14px;font-weight:600}.bar .cnt b{color:var(--accent)}
  .search{border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13.5px;min-width:240px;background:#fff;outline:none}
  .search:focus{border-color:var(--accent)}
  .toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;user-select:none;color:#374151}
  .toggle .sw{width:36px;height:21px;border-radius:999px;background:#d8dae3;position:relative;transition:.15s;flex:none}
  .toggle .sw::after{content:"";position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle.on .sw{background:var(--accent)}.toggle.on .sw::after{left:17px}
  select.sort{margin-left:auto;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:13px;background:#fff;cursor:pointer}

  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:980px}
  thead th{text-align:left;background:#f7f8fb;color:#475569;font-weight:700;font-size:12px;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:12px 14px;border-bottom:1px solid #f1f2f6;vertical-align:top}
  tbody tr:hover{background:#fbfbfe}
  tbody tr.is-new{background:#fff9f9}tbody tr.is-new:hover{background:#fff3f3}
  .co{display:flex;align-items:center;gap:10px}
  .avatar{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;flex:none}
  .co-name{font-weight:700}.co-cat{font-size:11px;color:var(--muted)}
  .pos{font-weight:600;color:var(--ink)}
  .new{display:inline-block;background:#ef4444;color:#fff;font-size:9.5px;font-weight:800;border-radius:5px;padding:1px 5px;margin-left:6px;vertical-align:middle}
  .ptags{margin-top:5px;display:flex;flex-wrap:wrap;gap:5px}
  .kw{font-size:11px;color:#5b5bd6;background:#eeeefb;border:1px solid #e3e3fb;border-radius:6px;padding:1px 7px}
  .kw::before{content:"#";opacity:.5}
  .tag{font-size:11px;font-weight:600;border-radius:6px;padding:2px 7px;background:#f1f2f6;color:#475569}
  .f-eng{background:#e8effd;color:#2563eb}.f-ops{background:#e6f6ef;color:#059669}.f-product{background:#f1e9fe;color:#7c3aed}
  .f-design{background:#fce7f1;color:#db2777}.f-data{background:#e2f5fa;color:#0891b2}.f-security{background:#fde8e8;color:#dc2626}
  .f-growth{background:#fdeede;color:#ea580c}.f-bd{background:#fbf4d9;color:#b58a04}.f-ga{background:#eef1f5;color:#475569}
  .salary{font-weight:700;color:#047857;white-space:nowrap}.salary.neg{color:#94a3b8;font-weight:600}
  .srctag{display:inline-block;font-size:11.5px;font-weight:600;color:#5b21b6;background:#f1e9fe;border-radius:6px;padding:3px 8px;white-space:nowrap}
  .contact{font-weight:600}
  .contact.none{color:#b0b6c3;font-weight:500}
  .cinfo a{color:var(--accent);font-weight:600}
  .apply{display:inline-block;border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;color:#374151;white-space:nowrap}
  .apply:hover{border-color:var(--accent);color:var(--accent)}
  .posted{white-space:nowrap;color:#475569;font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:46px}
  .note{max-width:1280px;margin:0 auto;padding:10px 24px 30px;color:#9aa1b1;font-size:12px;line-height:1.7}
  .load-error{max-width:1280px;margin:20px auto;padding:14px 24px;color:#b91c1c}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-in">
    <a class="brand" href="index.html"><span class="logo">链</span><span>链聘 ChainHire<small>Web3 全职能招聘 · 每日更新</small></span></a>
    <div class="nav-links"><a href="index.html">职位</a><a href="stats.html">数据洞察</a><a href="companies.html">合作单位</a><a href="headhunter.html" class="active">猎头端</a></div>
    <div class="nav-right"><span id="upd" class="upd"><span class="dot"></span><span id="upd-t">—</span></span></div>
  </div>
</nav>

<div class="head">
  <h1>猎头端 · 职位线索</h1>
  <p>面向猎头的外联线索表：招聘公司、来源渠道、岗位信息、联系人 / 联系方式与最新发布时间，可搜索、筛选与排序。</p>
</div>

<div id="load-error" class="load-error" style="display:none">⚠️ 未能加载 <code>data.js</code>，请确认与本页同目录，或用本地服务打开。</div>

<div class="wrap">
  <div class="bar">
    <div class="cnt">共 <b id="cnt">0</b> 条线索</div>
    <input class="search" id="search" placeholder="搜索公司 / 岗位 / 来源 / 联系人…" />
    <label class="toggle" id="t-contact"><span class="sw"></span><span>仅看有联系方式</span></label>
    <select class="sort" id="sort">
      <option value="latest">按最新发布</option>
      <option value="company">按公司名</option>
      <option value="salary">按薪资高低</option>
    </select>
  </div>

  <div class="tablecard">
    <div class="scroll">
      <table>
        <thead>
          <tr>
            <th>招聘公司</th><th>岗位信息</th><th>薪资</th><th>来源渠道</th>
            <th>联系人</th><th>联系方式 / 投递</th><th>最新发布</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="empty" style="display:none">未匹配到线索，试试放宽筛选。</div>
  </div>
</div>

<div class="note" id="note"></div>

<script src="data.js"></script>
<script>
(function(){
  const DATA=window.WEB3_JOBS_DATA;
  if(!DATA||!Array.isArray(DATA.jobs)){document.getElementById("load-error").style.display="block";return;}
  const data=DATA.jobs, lastUpdated=DATA.lastUpdated||"", lastUpdatedAt=DATA.lastUpdatedAt||"";
  const isNew=d=>d.firstSeen&&d.firstSeen===lastUpdated;
  const pad2=n=>String(n).padStart(2,"0");
  const fmtDT=iso=>{const d=new Date(iso);if(isNaN(d.getTime()))return iso||lastUpdated;return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;};
  const updDisplay=lastUpdatedAt?fmtDT(lastUpdatedAt):lastUpdated;
  const updFresh=lastUpdatedAt?((Date.now()-new Date(lastUpdatedAt).getTime())/36e5<=6):false;

  const funcLabels={eng:"工程研发",ops:"运维/SRE",product:"产品",design:"设计",data:"数据/AI",security:"安全",growth:"市场/增长",bd:"BD/销售",ga:"合规/HR"};
  const catLabels={exchange:"交易所",chain:"公链/L2",defi:"钱包/DeFi",infra:"节点/RPC基础设施",other:"合规/托管/其他"};
  const lvlLabels={head:"负责人/总监",senior:"资深/Staff",mid:"中级"};
  const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const palette=['#6d5efc','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#3b82f6'];
  const acolor=n=>{let h=0;for(const c of (n||""))h=(h*31+c.charCodeAt(0))>>>0;return palette[h%palette.length];};
  const initial=n=>((n||"?").trim()[0]||"?").toUpperCase();
  const isEmail=s=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s||"");

  const SRC={'jobs.lever.co':'Lever','jobs.ashbyhq.com':'Ashby','job-boards.greenhouse.io':'Greenhouse','boards.greenhouse.io':'Greenhouse',
    'web3.career':'Web3.career','cryptojobslist.com':'CryptoJobsList','cryptocurrencyjobs.co':'CryptocurrencyJobs','v2ex.com':'V2EX',
    'learnblockchain.cn':'登链社区','crypto-careers.com':'Crypto-Careers','nodeflair.com':'NodeFlair','simplify.jobs':'Simplify',
    'weworkremotely.com':'WeWorkRemotely','beincrypto.com':'BeInCrypto'};
  const srcOf=link=>{try{const h=new URL(link).hostname.replace(/^www\./,'');return SRC[h]||(h.includes('.')?h:'—');}catch(e){return '—';}};

  const state={search:"",contactOnly:false,sort:"latest"};
  document.getElementById("search").addEventListener("input",e=>{state.search=e.target.value.trim().toLowerCase();render();});
  const tc=document.getElementById("t-contact");
  tc.onclick=()=>{state.contactOnly=!state.contactOnly;tc.classList.toggle("on");render();};
  document.getElementById("sort").onchange=e=>{state.sort=e.target.value;render();};

  function rows(){
    let r=data.filter(j=>{
      if(state.contactOnly && !(j.contact||j.contactInfo)) return false;
      if(state.search){const b=(j.company+" "+j.position+" "+srcOf(j.link)+" "+(j.contact||"")+" "+(j.contactInfo||"")+" "+j.location+" "+(j.keywords||[]).join(" ")).toLowerCase();if(!b.includes(state.search))return false;}
      return true;
    });
    const s=state.sort;
    if(s==="company") r.sort((a,b)=>a.company.localeCompare(b.company,"en"));
    else if(s==="salary") r.sort((a,b)=>(b.salaryNum||0)-(a.salaryNum||0));
    else r.sort((a,b)=>(b.firstSeen||"").localeCompare(a.firstSeen||"") || (isNew(b)?1:0)-(isNew(a)?1:0)); // latest
    return r;
  }

  function render(){
    const r=rows();
    document.getElementById("cnt").textContent=r.length;
    document.getElementById("empty").style.display=r.length?"none":"block";
    document.getElementById("tbody").innerHTML=r.map(j=>{
      const neg=!j.salary||/面议/.test(j.salary);
      const src=srcOf(j.link);
      const contactCell=j.contact?`<span class="contact">${esc(j.contact)}</span>`:`<span class="contact none">—</span>`;
      let cinfo;
      if(j.contactInfo){ cinfo=isEmail(j.contactInfo)?`<a href="mailto:${esc(j.contactInfo)}">${esc(j.contactInfo)}</a>`:`<span>${esc(j.contactInfo)}</span>`; cinfo+=` · <a class="apply" href="${j.link}" target="_blank" rel="noopener">原帖</a>`; }
      else { cinfo=`<a class="apply" href="${j.link}" target="_blank" rel="noopener">投递链接 →</a>`; }
      return `<tr class="${isNew(j)?'is-new':''}">
        <td><div class="co"><div class="avatar" style="background:${acolor(j.company)}">${esc(initial(j.company))}</div>
          <div><div class="co-name">${esc(j.company)}</div><div class="co-cat">${catLabels[j.category]||j.category}</div></div></div></td>
        <td><div class="pos">${esc(j.position)}${isNew(j)?'<span class="new">NEW</span>':''}</div>
          <div class="ptags"><span class="tag f-${j.func||'ga'}">${funcLabels[j.func]||'其他'}</span><span class="tag">${lvlLabels[j.level]||j.level}</span><span class="tag">📍 ${esc(j.location)}</span></div>
          ${(j.keywords&&j.keywords.length)?`<div class="ptags">${j.keywords.slice(0,5).map(k=>`<span class="kw">${esc(k)}</span>`).join("")}</div>`:""}</td>
        <td><span class="salary ${neg?'neg':''}">${esc(j.salary||'面议')}</span></td>
        <td><span class="srctag">${esc(src)}</span></td>
        <td>${contactCell}</td>
        <td class="cinfo">${cinfo}</td>
        <td><span class="posted">${j.firstSeen||'—'}</span></td>
      </tr>`;
    }).join("");
  }

  // header pill
  const pill=document.getElementById("upd"),t=document.getElementById("upd-t");
  pill.className="upd"+(updFresh?"":" stale");
  t.textContent="更新 "+updDisplay;
  const withContact=data.filter(j=>j.contact||j.contactInfo).length;
  document.getElementById("note").innerHTML=`来源渠道由职位链接自动识别；联系人 / 联系方式仅展示来源公开招聘信息中明确披露的内容（当前 ${withContact} 条含直接联系方式，其余以来源渠道投递），不含任何非公开数据 · 最近更新 ${updDisplay} · <a href="index.html" style="color:var(--accent)">← 返回职位列表</a>`;

  render();
})();
</script>
</body>
</html>
