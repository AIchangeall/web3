<script>
(async function(){
  const DATA = window.WEB3_JOBS_DATA;
  if(!DATA){ document.getElementById("load-error").style.display="block"; return; }
  if(!Array.isArray(DATA.jobs) && Array.isArray(DATA.chunks)){
    try{ const arrs = await Promise.all(DATA.chunks.map(c => fetch(c).then(r => r.ok ? r.json() : []))); DATA.jobs = arrs.flat(); }catch(e){}
  }
  const data = DATA.jobs || [];

  const lastUpdated = DATA.lastUpdated || "";
  const lastUpdatedAt = DATA.lastUpdatedAt || "";
  const pad2 = n => String(n).padStart(2,"0");
  const fmtDT = iso => { const d=new Date(iso); if(isNaN(d.getTime())) return iso||lastUpdated; return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`; };
  const updDisplay = lastUpdatedAt?fmtDT(lastUpdatedAt):lastUpdated;
  const updFresh = lastUpdatedAt?((Date.now()-new Date(lastUpdatedAt).getTime())/36e5<=6):false;

  // 按日期聚合：优先用 changelog.added；缺失日期用 firstSeen 累计补
  const byDate = {};
  for(const e of (DATA.changelog||[])){
    if(e.date) byDate[e.date] = (byDate[e.date]||0) + (e.added||0);
  }
  // firstSeen 补充（若 changelog 没记录某天，就用当天实际 firstSeen 的岗位数补上）
  const fsCount = {};
  for(const j of data) if(j.firstSeen) fsCount[j.firstSeen] = (fsCount[j.firstSeen]||0)+1;
  for(const d in fsCount) if(!byDate[d]) byDate[d] = fsCount[d];

  // 取 lastUpdated 为终点，向前 365 天
  const endStr = lastUpdated || (new Date().toISOString().slice(0,10));
  const [yy,mm,dd] = endStr.split("-").map(Number);
  const end = new Date(yy, mm-1, dd);
  const days = [];
  for(let i=364; i>=0; i--){ const d=new Date(end); d.setDate(end.getDate()-i); days.push(d); }
  const keyOf = d => d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
  const cells = days.map(d => ({ date:d, key:keyOf(d), count: byDate[keyOf(d)]||0 }));

  // KPI
  const totalAdded = cells.reduce((s,c)=>s+c.count,0);
  const activeCells = cells.filter(c=>c.count>0);
  const activeDays = activeCells.length;
  const silentDays = cells.length - activeDays;
  const peakCell = cells.reduce((m,c)=>c.count>m.count?c:m, cells[0]);
  const avgPerActive = activeDays ? Math.round(totalAdded/activeDays) : 0;

  // 等级 0-5
  const maxCount = Math.max(1, ...cells.map(c=>c.count));
  function level(n){
    if(n===0) return 0;
    if(maxCount<=1) return 5;
    const r = n/maxCount;
    if(r<0.15) return 1;
    if(r<0.35) return 2;
    if(r<0.55) return 3;
    if(r<0.80) return 4;
    return 5;
  }

  // 渲染 SVG（7 行 × N 列，按周排列；周日在最上）
  function renderHeat(){
    const cellSize=12, gap=2;
    const colW = cellSize+gap, rowH = cellSize+gap;
    const labelW = 28, labelH = 20;
    // 列起点：第一天所在周的周日
    const start = new Date(cells[0].date); start.setDate(start.getDate() - start.getDay());
    const colOf = d => Math.floor((d - start)/86400000/7);
    const rowOf = d => d.getDay();
    const cols = colOf(cells[cells.length-1].date) + 1;
    const W = labelW + cols*colW + 4;
    const H = labelH + 7*rowH + 4;

    let svg = `<svg viewBox="0 0 ${W} ${H}" class="hm-svg" xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">`;
    // 月份标签：当月第 1-7 天遇到的列上方写月份
    let lastMonth = -1;
    for(const c of cells){
      if(c.date.getDate()<=7 && c.date.getMonth()!==lastMonth){
        lastMonth = c.date.getMonth();
        const x = labelW + colOf(c.date)*colW;
        const lbl = (I18N.lang==="zh") ? (c.date.getMonth()+1)+"月" : ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][c.date.getMonth()];
        svg += `<text x="${x}" y="${labelH-7}" font-size="9" fill="#9aa1b1">${lbl}</text>`;
      }
    }
    // 周几标签（zh: 一三五；en: M W F）
    const wls = (I18N.lang==="zh") ? ["","一","","三","","五",""] : ["","Mon","","Wed","","Fri",""];
    for(let r=0; r<7; r++){
      if(wls[r]) svg += `<text x="0" y="${labelH + r*rowH + cellSize - 2}" font-size="9" fill="#9aa1b1">${wls[r]}</text>`;
    }
    // 格子
    for(const c of cells){
      const x = labelW + colOf(c.date)*colW;
      const y = labelH + rowOf(c.date)*rowH;
      const cls = "hm-l"+level(c.count);
      const t = (I18N.lang==="zh") ? `${c.key} · 新增 ${c.count}` : `${c.key} · +${c.count}`;
      svg += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="2" class="${cls}" data-count="${c.count}" data-date="${c.key}"><title>${t}</title></rect>`;
    }
    svg += '</svg>';
    document.getElementById("hm-svg-wrap").innerHTML = svg;

    // 点击格子 → 首页该日筛选（用 q= 搜索 firstSeen 关键字；index 已支持 q）
    document.querySelectorAll('#hm-svg-wrap rect[data-count]').forEach(r=>{
      r.style.cursor = 'pointer';
      r.addEventListener('click', ()=>{ const d=r.getAttribute('data-date'); location.href = 'index.html?date='+d; });
    });
  }

  function renderTop(){
    const top = activeCells.slice().sort((a,b)=>b.count-a.count).slice(0,10);
    const max = top[0]?.count || 1;
    const html = top.map(c=>`<li><span class="hm-date">${c.key}</span><span class="hm-bar"><span style="width:${(c.count/max*100).toFixed(1)}%"></span></span><b>+${c.count}</b></li>`).join("");
    document.getElementById("hm-top-list").innerHTML = html || `<li style="border:0;color:var(--muted)">${I18N.t("empty.jobs")}</li>`;
  }

  function head(){
    document.getElementById("k-total").textContent = totalAdded;
    document.getElementById("k-peak").textContent = peakCell.count>0 ? `${peakCell.key} (+${peakCell.count})` : "—";
    document.getElementById("k-avg").textContent = "+"+avgPerActive;
    document.getElementById("k-silent").textContent = silentDays;
    const pill=document.getElementById("upd"), t=document.getElementById("upd-t");
    pill.className="upd"+(updFresh?"":" stale");
    t.textContent = I18N.t("upd.prefix")+" "+updDisplay;
    const fn = I18N.lang==="zh"
      ? `数据来自 changelog 与岗位首次出现日期(firstSeen) 实时聚合 · 终点 ${endStr} · 共 ${data.length} 个岗位 · 最近更新 ${updDisplay}`
      : `Aggregated live from changelog and per-job firstSeen · ends ${endStr} · ${data.length} roles · updated ${updDisplay}`;
    document.getElementById("note").innerHTML = `${fn} · <a href="index.html" style="color:var(--accent)">${I18N.lang==="zh"?"← 返回职位列表":"← Back to jobs"}</a> · <a href="about.html" style="color:var(--accent)">${I18N.t("nav.about")}</a>`;
  }

  head(); renderHeat(); renderTop();
  window.addEventListener("langchange", ()=>{ head(); renderHeat(); renderTop(); });
})();
</script>
