window.toggleTheme=function(){var dark=d.getAttribute('data-theme')==='dark';if(dark)d.removeAttribute('data-theme');else d.setAttribute('data-theme','dark');try{localStorage.setItem('cnh_theme',dark?'light':'dark');}catch(e){}document.querySelectorAll('[data-themebtn]').forEach(function(b){b.textContent=dark?'🌙':'☀️';});};
document.addEventListener('DOMContentLoaded',function(){var on=d.getAttribute('data-theme')==='dark';document.querySelectorAll('[data-themebtn]').forEach(function(b){b.textContent=on?'☀️':'🌙';});});})();
</script>

  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}

  .wrap{max-width:1180px;margin:0 auto 60px;padding:0 24px;display:flex;flex-direction:column;gap:18px}
  .ds{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .ds::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bar,var(--accent))}
  .ds.industry{--bar:#ef4444}
  .ds.hiring{--bar:#f97316}
  .dsh{display:flex;align-items:center;gap:10px;padding:16px 22px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .dsh .dot{width:8px;height:8px;border-radius:99px;background:var(--bar,var(--accent));flex:none}
  .dsh .title{font-weight:700;font-size:15px;letter-spacing:.01em}
  .dsh .tag{font-size:11px;font-weight:700;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;padding:2px 8px;border-radius:5px;letter-spacing:.04em}
  .ds.hiring .dsh .tag{color:#c2410c;background:#fff7ed;border-color:#fed7aa}
  .dsh .lastrun{margin-left:auto;font-size:12px;color:var(--muted);font-weight:500;display:inline-flex;align-items:center;gap:6px}
  .dsh .archive{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;background:transparent;border:0;padding:0;display:inline-flex;align-items:center;gap:4px}
  .dsh .archive:hover{text-decoration:underline}

  .dsl{list-style:none;margin:0;padding:0}
  .dsi{display:flex;gap:16px;align-items:flex-start;padding:16px 22px;border-bottom:1px dashed rgba(15,23,41,.08)}
  .dsi:last-child{border-bottom:0}
  .dsi-m{flex:1;min-width:0}
  .dsi-t{margin:0 0 6px;font-weight:700;font-size:14.5px;line-height:1.45;color:var(--ink);word-break:break-word}
  .dsi-d{color:#4b5563;font-size:13px;line-height:1.65;word-break:break-word}
  .dsi-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:7px;font-size:11.5px;color:var(--muted)}
  .dsi-meta .src{font-weight:600;color:#475569}
  .dsi-meta .tag{background:#f1f3f8;color:#64748b;border-radius:4px;padding:1px 7px;font-size:10.5px;font-weight:700}
  .dsi-link{flex:none;color:var(--accent);font-size:12.5px;font-weight:600;white-space:nowrap;align-self:flex-start;padding-top:1px;display:inline-flex;align-items:center;gap:3px;transition:.12s}
  .dsi-link:hover{text-decoration:underline}
  .dsi-link .arr{font-size:11px}

  .ds-empty{padding:30px 22px;text-align:center;color:var(--muted);font-size:13px}
  .ds-empty b{color:var(--ink);font-weight:700}

  .pagefoot{max-width:1180px;margin:0 auto 24px;padding:18px 24px 0;color:var(--muted);font-size:12px;line-height:1.7;border-top:1px solid var(--line)}

  @media(max-width:760px){

.wrap{padding:0 14px;gap:14px}

    .dsi{padding:14px 16px;gap:10px}
    .dsi-t{font-size:14px}
    .dsi-d{font-size:12.5px}
    .dsi-link{font-size:11.5px}
  }
</style>

<script>
(function(){
  // 资讯页独立维护：不读 data.js 的 lastUpdatedAt，只用 news.json 自己的时间戳
  const pad2 = n => String(n).padStart(2,"0");
  const fmtDT = iso => { const d=new Date(iso); if(isNaN(d.getTime())) return iso||""; return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`; };

  // ---------- 资讯渲染 ----------
  let NEWS = {industry:[], hiring:[], updated:"", updatedAt:""};
  const DEFAULT_N = 6;
  const expanded = {industry:false, hiring:false};

  function esc(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
  function host(u){try{return new URL(u).hostname.replace(/^www\./,"");}catch{return "";}}
  function fmtDate(iso){
    if(!iso) return "—";
    const t=Date.parse(iso); if(!t) return iso;
    const d=new Date(t);
    return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
  }
  function rel(iso){
    if(!iso) return "";
    const t=Date.parse(iso); if(!t) return "";
    const diff=Math.max(0,(Date.now()-t)/1000);
    const z=(window.I18N&&I18N.lang||"zh")==="zh";
    if(diff<60) return z?"刚刚":"just now";
    if(diff<3600) return Math.floor(diff/60)+(z?" 分钟前":"m ago");
    if(diff<86400) return Math.floor(diff/3600)+(z?" 小时前":"h ago");
    if(diff<86400*7) return Math.floor(diff/86400)+(z?" 天前":"d ago");
    return fmtDate(iso);
  }
  function langT(k, fallbackZh){ return (window.I18N&&I18N.t)?I18N.t(k)||fallbackZh:fallbackZh; }

  function renderList(type){
    const ul = document.getElementById("list-"+type); if(!ul) return;
    const arr = NEWS[type] || [];
    const n = expanded[type] ? arr.length : Math.min(DEFAULT_N, arr.length);
    if (!arr.length) {
      const z=(window.I18N&&I18N.lang||"zh")==="zh";
      const msg = type==="industry" ? (z?"暂无行业要闻，等待下一次抓取":"No industry highlights yet — waiting for next sync")
                                     : (z?"暂无招聘动态，等待下一次抓取":"No hiring updates yet — waiting for next sync");
      ul.innerHTML = `<li class="ds-empty">${esc(msg)}</li>`;
      return;
    }
    const linkT = langT("home.original", "原文 ↗");
    ul.innerHTML = arr.slice(0,n).map(it=>{
      const tag = it.tag ? `<span class="tag">${esc(it.tag)}</span>` : "";
      const src = esc(it.source || host(it.url));
      const meta = `<div class="dsi-meta"><span class="src">${src}</span><span>·</span><span>${esc(rel(it.publishedAt))}</span>${tag}</div>`;
      const desc = it.summary ? `<div class="dsi-d">${esc(it.summary)}</div>` : "";
      return `<li class="dsi">
        <div class="dsi-m">
          <h3 class="dsi-t">${esc(it.title)}</h3>
          ${desc}
          ${meta}
        </div>
        <a class="dsi-link" href="${esc(it.url)}" target="_blank" rel="noopener nofollow"><span>${esc(linkT.replace(/\s*↗\s*$/,""))}</span><span class="arr">↗</span></a>
      </li>`;
    }).join("");
    // 切换按钮文案
    const btn = document.querySelector(`[data-archive="${type}"]`);
    if (btn) {
      const z=(window.I18N&&I18N.lang||"zh")==="zh";
      if (arr.length <= DEFAULT_N) btn.style.display="none";
      else { btn.style.display=""; btn.textContent = expanded[type] ? (z?"收起 ↑":"Collapse ↑") : (z?"查看完整归档 →":"View archive →"); }
    }
  }

  function renderAll(){
    const newest = arr => arr.reduce((m,x)=>x.publishedAt&&(!m||x.publishedAt>m)?x.publishedAt:m,"");
    document.getElementById("lr-industry").textContent = fmtDate(newest(NEWS.industry||[]) || NEWS.updatedAt);
    document.getElementById("lr-hiring").textContent = fmtDate(newest(NEWS.hiring||[]) || NEWS.updatedAt);
    renderList("industry");
    renderList("hiring");
  }

  async function load(){
    try{
      const r = await fetch("news.json", {cache:"no-cache"});
      if (!r.ok) { renderAll(); return; }
      const j = await r.json();
      NEWS.industry = Array.isArray(j.industry) ? j.industry : [];
      NEWS.hiring = Array.isArray(j.hiring) ? j.hiring : [];
      NEWS.updated = j.updated || "";
      NEWS.updatedAt = j.updatedAt || "";
    }catch{}
    renderAll();
  }

  // 折叠 / 展开
  document.addEventListener("click", e=>{
    const t = e.target.closest("[data-archive]"); if(!t) return;
    const k = t.dataset.archive; expanded[k] = !expanded[k]; renderList(k);
  });
  window.addEventListener("langchange", renderAll);

  load();
})();
</script>
