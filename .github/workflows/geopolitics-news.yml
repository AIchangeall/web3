name: Web3 Geopolitics News

on:
  schedule:
    - cron: '30 */5 * * *'  # 每5小时+30分：0:30 5:30 10:30 15:30 20:30 UTC
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk --no-save

      - name: Fetch geopolitics news
        run: node scripts/fetch_news.mjs geopolitics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Apply news to news.json
        run: node apply_news.mjs news_input.json

      - name: Commit and push
        run: |
          git config user.name "web3-jobs-bot"
          git config user.email "gmjobs@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update geopolitics news [bot]"
          git push
